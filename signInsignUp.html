<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 / 註冊 - CinemaVerse</title>

<!-- ===== 字體：思源黑體 ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<!-- ===== Font Awesome ===== -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="movieWebsite.css">

</head>
<body>
<div class="auth-page">

  <!-- =====================================================
       登入 / 註冊主卡片（左圖 + 右表單）
       ===================================================== -->
  <div class="auth-card">
  
    <!-- ═══════════════════════════════
         左側：圖片區塊
         ═══════════════════════════════ -->
    <div class="auth-image-col">
  
      <!-- 底圖 -->
      <img src="https://picsum.photos/id/1040/800/900" alt="CinemaVerse 背景">
  
      <!-- 左上：Logo -->
      <a class="auth-logo" href="index.html">CINEMA<span>VERSE</span></a>
  
      <!-- 右上：返回網站連結 -->
      <a class="auth-back" href="movie-home.html">
        返回首頁 <i class="fas fa-arrow-right"></i>
      </a>
  
      <!-- 左下：圖片文字說明 + 指示點 -->
      <div class="auth-image-text">
        <h2>探索無限電影世界<br>從這裡開始</h2>
        <p>加入 CinemaVerse，享受超過 5,000 部精選電影，<br>隨時隨地開啟你的觀影旅程。</p>
        <!-- 輪播指示點裝飾 -->
        <div class="auth-dots">
          <div class="auth-dot"></div>
          <div class="auth-dot"></div>
          <div class="auth-dot active"></div>
        </div>
      </div>
  
    </div><!-- end 左側圖片 -->
  
  
    <!-- ═══════════════════════════════
         右側：登入 / 註冊表單
         ═══════════════════════════════ -->
    <div class="auth-form-col">
  
      <!-- 分頁 Tab：登入 / 註冊 -->
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">註冊</div>
      </div>
  
  
      <!-- ─────────────────────────────
           登入面板
           ───────────────────────────── -->
      <div class="form-panel active" id="panel-login">
  
        <!-- 標題 -->
        <h2 class="auth-form-title">歡迎回來</h2>
        <p class="auth-form-sub">
          還沒有帳號？
          <a href="#" onclick="switchTab('register');return false;">立即註冊</a>
        </p>
  
        <!-- 郵箱 -->
        <div class="form-group">
          <label>電子郵箱</label>
          <input type="email" placeholder="請輸入電子郵箱">
        </div>
  
        <!-- 密碼 -->
        <div class="form-group">
          <label>登入密碼</label>
          <div class="input-icon-wrap">
            <input type="password" id="login-pwd" placeholder="請輸入密碼">
            <span class="input-eye" onclick="togglePwd('login-pwd', this)">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>
  
        <!-- 忘記密碼 -->
        <div class="form-forgot">
          <a href="#">忘記密碼？</a>
        </div>
  
        <!-- 登入按鈕 -->
        <button class="btn-primary">
          <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>登入帳號
        </button>
  
        <!-- 分隔線 -->
        <div class="auth-divider"><span>或使用以下方式登入</span></div>
  
        <!-- 社群登入按鈕 -->
        <div class="social-btns">
          <!-- Google 登入 -->
          <a href="#" class="btn-social btn-google">
            <!-- Google SVG icon -->
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            使用 Google 登入
          </a>
          <!-- Facebook 登入 -->
          <a href="#" class="btn-social btn-facebook">
            <i class="fab fa-facebook-f"></i>
            使用臉書登入
          </a>
        </div>
  
      </div><!-- end 登入面板 -->
  
  
      <!-- ─────────────────────────────
           註冊面板
           ───────────────────────────── -->
      <div class="form-panel" id="panel-register">
  
        <!-- 標題 -->
        <h2 class="auth-form-title">建立帳號</h2>
        <p class="auth-form-sub">
          已有帳號？
          <a href="#" onclick="switchTab('login');return false;">立即登入</a>
        </p>
  
        <!-- 姓氏 + 姓名（兩欄並排） -->
        <div class="form-row">
          <div class="form-group">
            <label>姓氏</label>
            <input type="text" placeholder="請輸入姓氏">
          </div>
          <div class="form-group">
            <label>姓名</label>
            <input type="text" placeholder="請輸入姓名">
          </div>
        </div>
  
        <!-- 電子郵箱 -->
        <div class="form-group">
          <label>電子郵箱</label>
          <input type="email" placeholder="請輸入電子郵箱">
        </div>
  
        <!-- 電話號碼 -->
        <div class="form-group">
          <label>電話號碼</label>
          <input type="tel" placeholder="請輸入電話號碼（例：0912345678）">
        </div>
  
        <!-- 註冊帳號 -->
        <div class="form-group">
          <label>註冊帳號</label>
          <input type="text" placeholder="請設定帳號名稱">
        </div>
  
        <!-- 註冊密碼 -->
        <div class="form-group">
          <label>註冊密碼</label>
          <div class="input-icon-wrap">
            <input type="password" id="reg-pwd" placeholder="請設定密碼（至少 8 位）">
            <span class="input-eye" onclick="togglePwd('reg-pwd', this)">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>
  
        <!-- 同意條款 checkbox -->
        <div class="form-agree">
          <input type="checkbox" id="agree-terms">
          <label for="agree-terms">
            我同意 CinemaVerse 的
            <a href="#">使用條款</a>及<a href="#">隱私權政策</a>
          </label>
        </div>
  
        <!-- 建立帳號按鈕 -->
        <button class="btn-primary">
          <i class="fas fa-user-plus" style="margin-right:8px;"></i>建立帳號
        </button>
  
        <!-- 分隔線 -->
        <div class="auth-divider"><span>或使用以下方式註冊</span></div>
  
        <!-- 社群登入 / 快速註冊按鈕 -->
        <div class="social-btns">
          <!-- Google 註冊 -->
          <a href="#" class="btn-social btn-google">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            使用 Google 註冊
          </a>
          <!-- Facebook 註冊 -->
          <a href="#" class="btn-social btn-facebook">
            <i class="fab fa-facebook-f"></i>
            使用臉書註冊
          </a>
        </div>
  
      </div><!-- end 註冊面板 -->
  
    </div><!-- end 右側表單 -->
  
  </div><!-- end .auth-card -->

</div>



<!-- =====================================================
     JavaScript：Tab 切換 + 密碼顯示/隱藏
     （純功能性，無視覺邏輯）
     ===================================================== -->
<script>

  /* ── Tab 切換（登入 / 註冊） ── */
  function switchTab(tab) {
    /* 切換 tab 樣式 */
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    /* 切換表單面板 */
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  }

  /* ── 密碼顯示 / 隱藏切換 ── */
  function togglePwd(inputId, iconEl) {
    var input = document.getElementById(inputId);
    var icon  = iconEl.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

</script>

</body>
</html>
